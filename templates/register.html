{% extends "base.html" %}
{% block title %}注册{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">🌱</div>
            <h1>创建账号</h1>
            <p class="auth-subtitle">开始你的健康管理之旅</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username"
                       placeholder="请输入用户名（至少2个字符）" required minlength="2">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password"
                       placeholder="请输入密码（至少4个字符）" required minlength="4">
            </div>
            <div class="form-group">
                <label for="confirm_password">确认密码</label>
                <input type="password" id="confirm_password" name="confirm_password"
                       placeholder="再次输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">注册</button>
        </form>
        <p class="auth-footer-text">
            已有账号？<a href="{{ url_for('login') }}">去登录</a>
        </p>
    </div>
</div>
{% endblock %}
